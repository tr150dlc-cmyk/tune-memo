<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アイリッシュＴｕｎｅ 記録帳</title>
<script src="https://cdn.jsdelivr.net/npm/abcjs@6.6.2/dist/abcjs-basic-min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap');

body {
  font-family: 'Zen Maru Gothic', sans-serif;
  padding: 16px;
  margin: 0;
  background: #fdfbf7;
  color: #555;
  background-image: linear-gradient(
    to bottom,
    rgba(0,0,0,0.03) 1px,
    transparent 1px
  );
  background-size: 100% 28px;
}

.container {
  max-width: 960px;
  margin: 0 auto;
}

.card {
  background: #fffefb;
  padding: 20px;
  border-radius: 18px;
  margin-bottom: 16px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.05);
  border: 1px solid #f1f1f1;
}

h1::before {
  content: "🎼 ";
}

h1 {
  color: #6b7280;
  font-weight: 600;
}

input, select, textarea {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  padding: 12px;
  font-size: 16px;
  width: 100%;
  box-sizing: border-box;
}

button {
  background: #a5d8ff;
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 12px;
  font-size: 15px;
  transition: 0.2s;
  cursor: pointer;
  width: 100%;
  box-sizing: border-box;
}

button:hover {
  background: #74c0fc;
}

button.sub {
  background: #dee2e6;
}

button.sub:hover {
  background: #adb5bd;
}

button.small {
  padding: 6px 10px;
  font-size: 13px;
  width: auto;
  margin-right: 6px;
  margin-top: 8px;
}

.top-tabs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}

.tab-btn {
  background: #f1f3f5;
  color: #666;
  border-radius: 12px;
  padding: 12px;
  font-weight: 500;
  text-align: center;
  white-space: nowrap;
}

.tab-btn.active {
  background: #a5d8ff;
  color: white;
  font-weight: 600;
}

.tab-panel {
  display: none;
}

.tab-panel.active {
  display: block;
}

.song-item,
.set-item {
  border-top: 1px dashed #e5e7eb;
  padding: 16px 0;
}

.song-item:first-child,
.set-item:first-child {
  border-top: none;
  padding-top: 0;
}

.title-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.title {
  font-size: 18px;
  font-weight: 600;
  color: #495057;
}

.done .title {
  color: #74c69d;
}

.aliases {
  font-size: 12px;
  color: #7d8790;
  margin-top: 4px;
  line-height: 1.5;
}

.tag-list {
  display: inline-flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 2px;
}

.tag-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  background: #eef7ff;
  border: 1px solid #d6ecff;
  color: #4b6b85;
  font-size: 12px;
}

.tag-chip .remove {
  cursor: pointer;
  font-weight: 700;
  line-height: 1;
}

.tag-picker-box {
  background: #fffefb;
  border: 1px solid #f1f3f5;
  border-radius: 14px;
  padding: 12px;
  margin-top: 8px;
}

.tag-section-title {
  font-size: 13px;
  color: #666;
  margin-bottom: 6px;
}

.tag-suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}

.tag-suggestion {
  display: inline-block;
  padding: 6px 10px;
  border-radius: 999px;
  background: #f5faff;
  border: 1px solid #dcefff;
  color: #4b6b85;
  font-size: 12px;
  cursor: pointer;
  width: auto;
}

.tag-entry-row {
  display: flex;
  gap: 8px;
  align-items: stretch;
  flex-wrap: wrap;
}

.tag-entry-row input {
  flex: 1;
  min-width: 180px;
}

.tag-entry-row button {
  width: auto;
  white-space: nowrap;
}

.memo-block {
  background: #fffdf7;
  border-left: 4px solid #ffe066;
  padding: 10px;
  border-radius: 10px;
  font-size: 14px;
  margin-top: 8px;
  line-height: 1.6;
  word-break: break-word;
}

.memo-block a {
  color: #339af0;
  text-decoration: underline;
  word-break: break-all;
}

.notation {
  margin-top: 10px;
  margin-bottom: 8px;
  background: #ffffff;
  border: 1px solid #f1f3f5;
  border-radius: 12px;
  padding: 10px;
  overflow-x: auto;
}

.set-box {
  background: #fffefb;
  border: 1px solid #f1f3f5;
  border-radius: 14px;
  padding: 12px;
  margin-top: 8px;
}

.set-song-link {
  text-decoration: underline;
  cursor: pointer;
}

.set-song-detail-panel {
  margin: 8px 0 12px 0;
  background: #ffffff;
  border: 1px solid #e3edf7;
  border-radius: 14px;
  padding: 12px;
}

.empty-box {
  background: #fff;
  border: 1px dashed #ddd;
  border-radius: 12px;
  padding: 16px;
  color: #aaa;
}

.filter-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: end;
  margin-bottom: 10px;
}

.filter-select {
  min-width: 220px;
  flex: 1;
}

.meta {
  font-size: 14px;
  color: #666;
  margin-bottom: 6px;
  word-break: break-word;
}

.muted {
  color: #666;
  font-size: 14px;
}

.inline-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.inline-actions button {
  width: auto;
  margin: 0;
}

.set-song-row {
  border-top: 1px solid #e5e5e5;
  padding: 10px 0;
}

.set-song-row:first-child {
  border-top: none;
  padding-top: 0;
}

.status {
  font-size: 14px;
  min-height: 20px;
  margin-top: 4px;
}

.ok {
  color: #0a7a35;
}

.err {
  color: #b00020;
}

.search-box {
  margin-bottom: 8px;
}

a {
  color: #339af0;
}

@media (max-width: 720px) {
  .top-tabs {
    grid-template-columns: repeat(2, 1fr);
  }

  .tag-entry-row {
    flex-direction: column;
  }

  .tag-entry-row button {
    width: 100%;
  }
}
</style>
</head>

<body>
<div class="container">

  <div class="card">
    <h1>曲管理アプリ</h1>
    <div class="muted">曲追加・曲一覧・SET作成・SET一覧を分けたタブUIです。</div>
  </div>

  <div class="top-tabs">
    <button class="tab-btn active" data-tab="addSong" onclick="switchTab('addSong')">曲を追加</button>
    <button class="tab-btn" data-tab="songList" onclick="switchTab('songList')">曲一覧</button>
    <button class="tab-btn" data-tab="createSet" onclick="switchTab('createSet')">SET作成</button>
    <button class="tab-btn" data-tab="setList" onclick="switchTab('setList')">SET一覧</button>
  </div>

  <div id="tab-addSong" class="tab-panel active">
    <div class="card">
      <h2 id="formTitle">曲を追加</h2>

      <label>The Session URL</label>
      <input id="sessionUrlInput" placeholder="https://thesession.org/tunes/182">

      <button type="button" onclick="fetchFromSession()">URLから自動入力</button>
      <div id="fetchStatus" class="status"></div>

      <label>曲名</label>
      <input id="titleInput" placeholder="曲名">

      <label>ジャンル</label>
      <select id="genreInput">
        <option value="">選択</option>
        <option>Reel</option>
        <option>Jig</option>
        <option>Slip Jig</option>
        <option>Hornpipe</option>
        <option>Polka</option>
        <option>Slide</option>
        <option>Waltz</option>
        <option>March</option>
        <option>Barndance</option>
        <option>Mazurka</option>
        <option>Strathspey</option>
        <option>Highland</option>
        <option>Air</option>
        <option>Planxty</option>
        <option>Other</option>
      </select>

      <label>URL</label>
      <input id="urlInput" placeholder="URL">

      <label>メモ</label>
      <textarea id="memoInput" placeholder="覚書、参考動画URL、Spotifyリンクなど"></textarea>

      <label>属性タグ</label>
      <div id="songTagEditor" class="tag-picker-box"></div>

      <button id="saveButton" type="button" onclick="addOrUpdateSong()">追加</button>
      <button id="cancelEditButton" class="sub" type="button" onclick="cancelEdit()" style="display:none;">編集をやめる</button>
    </div>
  </div>

  <div id="tab-songList" class="tab-panel">
    <div class="card">
      <h2>追加した曲の閲覧</h2>

      <div class="filter-row">
        <div class="search-box filter-select">
          <label>キーワード検索</label>
          <input id="songSearchInput" placeholder="曲名 / 別名 / メモ / タグ で検索" oninput="setSongSearch(this.value)">
        </div>

        <div>
          <button class="small status-btn" data-status="all" type="button" onclick="setStatus('all')">全部</button>
          <button class="small status-btn" data-status="want" type="button" onclick="setStatus('want')">未習得</button>
          <button class="small status-btn" data-status="done" type="button" onclick="setStatus('done')">習得</button>
        </div>

        <div class="filter-select">
          <label>ジャンル</label>
          <select id="genreFilterSelect" onchange="setGenreFilter(this.value)">
            <option value="all">ALL</option>
            <option>Reel</option>
            <option>Jig</option>
            <option>Slip Jig</option>
            <option>Hornpipe</option>
            <option>Polka</option>
            <option>Slide</option>
            <option>Waltz</option>
            <option>March</option>
            <option>Barndance</option>
            <option>Mazurka</option>
            <option>Strathspey</option>
            <option>Highland</option>
            <option>Air</option>
            <option>Planxty</option>
            <option>Other</option>
          </select>
        </div>

        <div class="filter-select">
          <label>属性タグ</label>
          <select id="songTagFilterSelect" onchange="setSongTagFilter(this.value)">
            <option value="all">ALL</option>
          </select>
        </div>
      </div>

      <div id="list"></div>
    </div>
  </div>

  <div id="tab-createSet" class="tab-panel">
    <div class="card">
      <h2>SETの作成</h2>

      <label>SET名</label>
      <input id="setNameInput" placeholder="例: Reel Set 1">

      <label>ジャンルで絞り込み</label>
      <select id="genreFilterForSet" onchange="updateSongSelectForSet()">
        <option value="all">ALL</option>
        <option>Reel</option>
        <option>Jig</option>
        <option>Slip Jig</option>
        <option>Hornpipe</option>
        <option>Polka</option>
        <option>Slide</option>
        <option>Waltz</option>
        <option>March</option>
        <option>Barndance</option>
        <option>Mazurka</option>
        <option>Strathspey</option>
        <option>Highland</option>
        <option>Air</option>
        <option>Planxty</option>
        <option>Other</option>
      </select>

      <label>曲を選択</label>
      <select id="songSelectForSet"></select>

      <button type="button" onclick="addSongToTempSet()">曲を追加</button>

      <h3>選択した曲</h3>
      <div id="tempSetList" class="set-box"></div>

      <label>属性タグ</label>
      <div id="setTagEditor" class="tag-picker-box"></div>

      <button type="button" onclick="saveTempSet()">SET登録</button>
    </div>
  </div>

  <div id="tab-setList" class="tab-panel">
    <div class="card">
      <h2>SETの閲覧</h2>

      <div class="filter-row">
        <div class="search-box filter-select">
          <label>キーワード検索</label>
          <input id="setSearchInput" placeholder="SET名 / メモ / タグ / 曲名 / 曲の別名 で検索" oninput="setSetSearch(this.value)">
        </div>

        <div class="filter-select">
          <label>属性タグ</label>
          <select id="setTagFilterSelect" onchange="setSetTagFilter(this.value)">
            <option value="all">ALL</option>
          </select>
        </div>
      </div>

      <div id="setList"></div>
    </div>
  </div>

</div>

<script>
const STORAGE_KEY = "songs";
const SETS_STORAGE_KEY = "sets";

let songs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let sets = JSON.parse(localStorage.getItem(SETS_STORAGE_KEY)) || [];

let currentStatusFilter = "all";
let currentGenreFilter = "all";
let currentSongTagFilter = "all";
let currentSetTagFilter = "all";
let currentSongSearch = "";
let currentSetSearch = "";
let editingId = null;
let currentTab = "addSong";
let tempSetSongs = [];
let openSetSongDetailId = null;
let focusedSongId = null;

let songEditorTags = [];
let setEditorTags = [];
let editSetEditorTags = [];

songs = songs.map(song => ({
  ...song,
  tags: Array.isArray(song.tags) ? song.tags : [],
  aliases: Array.isArray(song.aliases) ? song.aliases : []
}));

sets = sets.map(set => ({
  ...set,
  memo: set.memo || "",
  tags: Array.isArray(set.tags) ? set.tags : []
}));

function switchTab(tabName) {
  currentTab = tabName;

  if (tabName !== "songList") {
    focusedSongId = null;
  }
  if (tabName !== "setList") {
    openSetSongDetailId = null;
  }

  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.tab === tabName);
  });

  document.querySelectorAll(".tab-panel").forEach(panel => {
    panel.classList.remove("active");
  });

  const panel = document.getElementById("tab-" + tabName);
  if (panel) panel.classList.add("active");
}

function saveSongs() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(songs));
}

function saveSets() {
  localStorage.setItem(SETS_STORAGE_KEY, JSON.stringify(sets));
}

function saveAll() {
  saveSongs();
  saveSets();
}

function extractTuneId(url) {
  const text = String(url || "");
  const match = text.match(/tunes\/(\d+)/);
  return match ? match[1] : null;
}

function normalizeGenre(type) {
  if (!type) return "Other";
  const t = String(type).trim().toLowerCase();

  if (t === "reel") return "Reel";
  if (t === "jig") return "Jig";
  if (t === "slip jig") return "Slip Jig";
  if (t === "hornpipe") return "Hornpipe";
  if (t === "polka") return "Polka";
  if (t === "slide") return "Slide";
  if (t === "waltz") return "Waltz";
  if (t === "march") return "March";
  if (t === "barndance") return "Barndance";
  if (t === "mazurka") return "Mazurka";
  if (t === "strathspey") return "Strathspey";
  if (t === "highland") return "Highland";
  if (t === "air") return "Air";
  if (t === "planxty") return "Planxty";
  return "Other";
}

function cleanAbc(abc, title) {
  let text = String(abc || "").trim();
  if (!text) return "";

  if (!/^X:/m.test(text)) text = "X:1\n" + text;
  if (!/^T:/m.test(text)) text = `T:${title || "Tune"}\n` + text;
  if (!/^M:/m.test(text)) text = "M:4/4\n" + text;
  if (!/^L:/m.test(text)) text = "L:1/8\n" + text;
  if (!/^K:/m.test(text)) text = "K:D\n" + text;

  return text;
}

function extractFirstAbc(data) {
  if (!data || typeof data !== "object") return "";
  if (typeof data.abc === "string" && data.abc.trim()) return data.abc;

  if (Array.isArray(data.settings)) {
    for (const s of data.settings) {
      if (s && typeof s.abc === "string" && s.abc.trim()) return s.abc;
      if (s && typeof s.setting === "string" && s.setting.trim()) return s.setting;
      if (s && typeof s.notation === "string" && s.notation.trim()) return s.notation;
    }
  }
  return "";
}

function normalizeAliasList(values) {
  return Array.from(new Set(
    (values || [])
      .flat()
      .map(v => String(v || "").trim())
      .filter(Boolean)
  ));
}

function extractAliasesFromJson(data) {
  if (!data || typeof data !== "object") return [];

  const candidates = [
    data.also_known_as,
    data.alsoKnownAs,
    data.aliases,
    data.alias,
    data.aka,
    data.akAs,
    data.alternative_titles,
    data.alternativeTitles,
    data.alt_titles,
    data.altTitles,
    data.other_titles,
    data.otherTitles,
    data.names,
    data.titles
  ];

  const aliases = [];
  for (const candidate of candidates) {
    if (Array.isArray(candidate)) aliases.push(...candidate);
    else if (typeof candidate === "string") aliases.push(...candidate.split(/[,;/]|(?:\s{2,})/));
  }

  return normalizeAliasList(aliases);
}

function extractAliasesFromHtml(html) {
  if (!html) return [];

  const cleaned = html
    .replace(/<script[\s\S]*?<\/script>/gi, " ")
    .replace(/<style[\s\S]*?<\/style>/gi, " ")
    .replace(/<[^>]+>/g, " ")
    .replace(/\s+/g, " ");

  const match = cleaned.match(/Also known as\s+(.*?)(?:Type|Key|Settings|Recordings|Comments|Learn more|Add to tunebook|$)/i);
  if (!match) return [];

  const raw = match[1]
    .replace(/\s+\|\s+/g, ",")
    .replace(/\s+\/\s+/g, ",")
    .replace(/\s+;\s+/g, ",")
    .trim();

  return normalizeAliasList(raw.split(","));
}

async function fetchAliasesForTune(tuneId) {
  let aliases = [];

  try {
    const res = await fetch(`https://thesession.org/tunes/${tuneId}?format=json`);
    if (res.ok) {
      const data = await res.json();
      aliases = extractAliasesFromJson(data);
    }
  } catch (e) {
    console.error("JSON alias fetch failed:", e);
  }

  if (aliases.length > 0) return aliases;

  try {
    const res = await fetch(`https://thesession.org/tunes/${tuneId}`);
    if (res.ok) {
      const html = await res.text();
      aliases = extractAliasesFromHtml(html);
    }
  } catch (e) {
    console.error("HTML alias fetch failed:", e);
  }

  return normalizeAliasList(aliases);
}

function escapeHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function linkifyText(text) {
  const escaped = escapeHtml(text);
  const urlRegex = /(https?:\/\/[^\s<]+)/g;
  return escaped
    .replace(urlRegex, (url) => `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`)
    .replace(/\n/g, "<br>");
}

function normalizeTag(tag) {
  return String(tag || "").trim();
}

function uniqueTags(tags) {
  return Array.from(new Set((tags || []).map(normalizeTag).filter(Boolean)));
}

function renderTags(tags) {
  if (!Array.isArray(tags) || tags.length === 0) return "";
  return `<div class="tag-list">${tags.map(tag => `<span class="tag-chip">${escapeHtml(tag)}</span>`).join("")}</div>`;
}

function renderAliases(aliases) {
  if (!Array.isArray(aliases) || aliases.length === 0) return "";
  return `<div class="aliases">別名: ${aliases.map(escapeHtml).join(" / ")}</div>`;
}

function getSongById(id) {
  return songs.find(song => song.id === id);
}

function getSetById(id) {
  return sets.find(set => set.id === id);
}

function getAllTags() {
  return Array.from(new Set([
    ...songs.flatMap(song => Array.isArray(song.tags) ? song.tags : []),
    ...sets.flatMap(set => Array.isArray(set.tags) ? set.tags : [])
  ])).sort();
}

function getAllSongTags() {
  return Array.from(new Set(
    songs.flatMap(song => Array.isArray(song.tags) ? song.tags : [])
  )).sort();
}

function getAllSetTags() {
  return Array.from(new Set(
    sets.flatMap(set => Array.isArray(set.tags) ? set.tags : [])
  )).sort();
}

function updateTagFilterOptions() {
  const songTagSelect = document.getElementById("songTagFilterSelect");
  const setTagSelect = document.getElementById("setTagFilterSelect");

  if (songTagSelect) {
    const tags = getAllSongTags();
    songTagSelect.innerHTML =
      `<option value="all">ALL</option>` +
      tags.map(tag => `<option value="${escapeHtml(tag)}">${escapeHtml(tag)}</option>`).join("");
    songTagSelect.value = tags.includes(currentSongTagFilter) ? currentSongTagFilter : "all";
  }

  if (setTagSelect) {
    const tags = getAllSetTags();
    setTagSelect.innerHTML =
      `<option value="all">ALL</option>` +
      tags.map(tag => `<option value="${escapeHtml(tag)}">${escapeHtml(tag)}</option>`).join("");
    setTagSelect.value = tags.includes(currentSetTagFilter) ? currentSetTagFilter : "all";
  }
}

function renderTagEditor(containerId, selectedTags, addFnName, removeFnName, inputId) {
  const container = document.getElementById(containerId);
  if (!container) return;

  const selected = uniqueTags(selectedTags);
  const suggestions = getAllTags().filter(tag => !selected.includes(tag));

  container.innerHTML = `
    <div class="tag-section-title">追加済みタグ</div>
    <div class="tag-list">
      ${selected.length
        ? selected.map(tag => `
            <span class="tag-chip">
              ${escapeHtml(tag)}
              <span class="remove" onclick="${removeFnName}('${escapeJs(tag)}')">×</span>
            </span>
          `).join("")
        : `<span class="muted">まだタグがありません</span>`
      }
    </div>

    <div style="margin-top:10px;" class="tag-section-title">候補から追加</div>
    <div class="tag-suggestions">
      ${suggestions.length
        ? suggestions.map(tag => `
            <button type="button" class="tag-suggestion" onclick="${addFnName}('${escapeJs(tag)}')">${escapeHtml(tag)}</button>
          `).join("")
        : `<span class="muted">候補なし</span>`
      }
    </div>

    <div class="tag-section-title">新しいタグを追加</div>
    <div class="tag-entry-row">
      <input id="${inputId}" placeholder="新しいタグ名">
      <button type="button" onclick="${addFnName}()">追加</button>
    </div>
  `;
}

function escapeJs(str) {
  return String(str || "")
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")
    .replace(/"/g, '\\"')
    .replace(/\n/g, "\\n");
}

async function fetchFromSession() {
  const statusEl = document.getElementById("fetchStatus");
  const sessionUrl = document.getElementById("sessionUrlInput").value.trim();
  const tuneId = extractTuneId(sessionUrl);

  statusEl.className = "status";
  statusEl.textContent = "";

  if (!sessionUrl || !tuneId) {
    statusEl.classList.add("err");
    statusEl.textContent = "The Session の tune URL を入力してください。";
    return;
  }

  statusEl.textContent = "取得中…";

  try {
    const res = await fetch(`https://thesession.org/tunes/${tuneId}?format=json`);
    if (!res.ok) throw new Error("取得失敗");

    const data = await res.json();
    const aliases = await fetchAliasesForTune(tuneId);

    document.getElementById("titleInput").value = data.name || data.title || "";
    document.getElementById("genreInput").value = normalizeGenre(data.type);
    document.getElementById("urlInput").value = sessionUrl;

    const statusExtra = aliases.length ? ` / 別名 ${aliases.length} 件取得` : "";
    statusEl.classList.add("ok");
    statusEl.textContent = `曲名とジャンルを自動入力しました${statusExtra}。`;
  } catch (e) {
    console.error(e);
    document.getElementById("urlInput").value = sessionUrl;
    statusEl.classList.add("err");
    statusEl.textContent = "自動取得できませんでした。URLのみ入力しました。";
  }
}

async function loadABC(song) {
  const tuneId = extractTuneId(song.url);
  if (!tuneId) return;

  try {
    const res = await fetch(`https://thesession.org/tunes/${tuneId}?format=json`);
    if (!res.ok) throw new Error("取得失敗");

    const data = await res.json();

    if (!song.genre || song.genre === "Other") {
      const fetchedGenre = normalizeGenre(data.type);
      if (fetchedGenre) song.genre = fetchedGenre;
    }

    if (!song.title) {
      song.title = data.name || data.title || song.title;
    }

    song.aliases = await fetchAliasesForTune(tuneId);

    const abc = extractFirstAbc(data);
    song.abc = cleanAbc(abc, song.title);

    saveSongs();
    renderAll();
  } catch (e) {
    console.error(e);
  }
}

async function addOrUpdateSong() {
  const songTitle = document.getElementById("titleInput").value.trim();
  const songGenre = document.getElementById("genreInput").value.trim() || "Other";
  const sourceUrl = document.getElementById("urlInput").value.trim();
  const songMemo = document.getElementById("memoInput").value.trim();
  const sessionUrlValue = document.getElementById("sessionUrlInput").value.trim();
  const songTags = uniqueTags(songEditorTags);

  if (!songTitle) {
    alert("曲名を入力してください。");
    return;
  }

  if (editingId !== null) {
    const oldSong = songs.find(song => song.id === editingId);
    const oldUrl = oldSong ? (oldSong.url || "") : "";

    songs = songs.map(song =>
      song.id === editingId
        ? {
            ...song,
            title: songTitle,
            genre: songGenre,
            url: sourceUrl,
            memo: songMemo,
            tags: songTags,
            abc: oldUrl !== sourceUrl ? "" : song.abc,
            aliases: oldUrl !== sourceUrl ? [] : (song.aliases || [])
          }
        : song
    );

    const updatedId = editingId;
    saveSongs();
    clearForm();
    renderAll();
    switchTab("songList");

    const updatedSong = songs.find(song => song.id === updatedId);
    if (updatedSong && sourceUrl) {
      await loadABC(updatedSong);
    }
    return;
  }

  const song = {
    id: Date.now(),
    title: songTitle,
    genre: songGenre,
    url: sourceUrl,
    memo: songMemo,
    done: false,
    abc: "",
    tags: songTags,
    aliases: []
  };

  songs.unshift(song);
  saveSongs();
  clearForm();
  renderAll();
  switchTab("songList");

  if (sourceUrl || sessionUrlValue) {
    await loadABC(song);
  }
}

function startEdit(id) {
  const song = songs.find(s => s.id === id);
  if (!song) return;

  editingId = id;
  songEditorTags = uniqueTags(song.tags || []);
  document.getElementById("formTitle").textContent = "曲を編集";
  document.getElementById("saveButton").textContent = "保存";
  document.getElementById("cancelEditButton").style.display = "block";

  document.getElementById("sessionUrlInput").value = song.url || "";
  document.getElementById("titleInput").value = song.title || "";
  document.getElementById("genreInput").value = song.genre || "";
  document.getElementById("urlInput").value = song.url || "";
  document.getElementById("memoInput").value = song.memo || "";

  renderSongTagEditor();
  switchTab("addSong");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function cancelEdit() {
  editingId = null;
  clearForm();
  renderAll();
}

function setStatus(value) {
  currentStatusFilter = value;
  renderSongs();
}

function setGenreFilter(value) {
  currentGenreFilter = value;
  renderSongs();
}

function setSongTagFilter(value) {
  currentSongTagFilter = value;
  renderSongs();
}

function setSetTagFilter(value) {
  currentSetTagFilter = value;
  renderSets();
}

function setSongSearch(value) {
  currentSongSearch = String(value || "").trim().toLowerCase();
  renderSongs();
}

function setSetSearch(value) {
  currentSetSearch = String(value || "").trim().toLowerCase();
  renderSets();
}

function updateStatusButtons() {
  document.querySelectorAll(".status-btn").forEach(btn => {
    btn.classList.remove("active");
    if (btn.dataset.status === currentStatusFilter) {
      btn.classList.add("active");
    }
  });
}

function filteredSongs() {
  return songs.filter(song => {
    const statusOk =
      currentStatusFilter === "all" ||
      (currentStatusFilter === "want" && !song.done) ||
      (currentStatusFilter === "done" && song.done);

    const genreOk =
      currentGenreFilter === "all" ||
      (song.genre || "Other") === currentGenreFilter;

    const tagOk =
      currentSongTagFilter === "all" ||
      (Array.isArray(song.tags) && song.tags.includes(currentSongTagFilter));

    const haystack = [
      song.title,
      ...(song.aliases || []),
      song.genre,
      song.memo,
      ...(song.tags || [])
    ].join(" ").toLowerCase();

    const searchOk =
      !currentSongSearch || haystack.includes(currentSongSearch);

    return statusOk && genreOk && tagOk && searchOk;
  });
}

function filteredSets() {
  return sets.filter(set => {
    const tagOk =
      currentSetTagFilter === "all" ||
      (Array.isArray(set.tags) && set.tags.includes(currentSetTagFilter));

    const songText = (set.songIds || [])
      .map(songId => {
        const song = getSongById(songId);
        if (!song) return "";
        return [song.title, ...(song.aliases || [])].join(" ");
      })
      .join(" ");

    const haystack = [
      set.name,
      set.memo,
      ...(set.tags || []),
      songText
    ].join(" ").toLowerCase();

    const searchOk =
      !currentSetSearch || haystack.includes(currentSetSearch);

    return tagOk && searchOk;
  });
}

function toggleDone(id) {
  songs = songs.map(song =>
    song.id === id ? { ...song, done: !song.done } : song
  );
  saveSongs();
  renderSongs();
}

function delSong(id) {
  if (!confirm("削除しますか？\nSETに入っている場合、そのSETからも消えます。")) return;

  songs = songs.filter(song => song.id !== id);
  sets = sets.map(set => ({
    ...set,
    songIds: set.songIds.filter(songId => songId !== id)
  }));

  saveAll();
  renderAll();
}

function clearForm() {
  document.getElementById("sessionUrlInput").value = "";
  document.getElementById("titleInput").value = "";
  document.getElementById("genreInput").value = "";
  document.getElementById("urlInput").value = "";
  document.getElementById("memoInput").value = "";
  document.getElementById("fetchStatus").textContent = "";
  document.getElementById("fetchStatus").className = "status";
  document.getElementById("formTitle").textContent = "曲を追加";
  document.getElementById("saveButton").textContent = "追加";
  document.getElementById("cancelEditButton").style.display = "none";
  editingId = null;
  songEditorTags = [];
  renderSongTagEditor();
}

function openSongFromSet(songId) {
  focusedSongId = songId;
  switchTab("songList");
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.tab === "songList");
  });
  document.querySelectorAll(".tab-panel").forEach(panel => {
    panel.classList.remove("active");
  });
  const panel = document.getElementById("tab-songList");
  if (panel) panel.classList.add("active");
  renderSongs();

  setTimeout(() => {
    const el = document.getElementById(`song-item-${songId}`);
    if (el) {
      el.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  }, 50);
}

function toggleSetSongDetail(songId) {
  openSetSongDetailId = openSetSongDetailId === songId ? null : songId;
  renderSets();

  if (openSetSongDetailId !== null) {
    setTimeout(() => {
      const song = getSongById(songId);
      if (song && song.abc) {
        try {
          ABCJS.renderAbc(`set-detail-abc-${songId}`, song.abc, {
            responsive: "resize",
            add_classes: true,
            staffwidth: 680
          });
        } catch (e) {
          console.error(e);
        }
      }
    }, 0);
  }
}

function renderSongs() {
  const list = document.getElementById("list");
  const items = filteredSongs().filter(song =>
    focusedSongId === null || song.id === focusedSongId
  );

  if (!list) return;

  if (items.length === 0) {
    list.innerHTML = `<div class="empty-box">該当する曲がありません。</div>`;
    updateStatusButtons();
    return;
  }

  list.innerHTML = items.map(song => `
    <div id="song-item-${song.id}" class="song-item ${song.done ? 'done' : ''}">
      <div class="title-row">
        <div class="title">${escapeHtml(song.title)}</div>
        ${renderTags(song.tags)}
      </div>

      ${renderAliases(song.aliases)}
      <div class="meta">ジャンル: ${escapeHtml(song.genre || "Other")}</div>
      <div id="abc-${song.id}" class="notation"></div>
      ${song.memo ? `<div class="memo-block">${linkifyText(song.memo)}</div>` : ""}
      ${song.url ? `<div class="meta"><a href="${escapeHtml(song.url)}" target="_blank" rel="noopener noreferrer">The Session を開く</a></div>` : ""}

      <div class="inline-actions">
        <button class="small" type="button" onclick="toggleDone(${song.id})">
          ${song.done ? "未習得に戻す" : "習得にする"}
        </button>
        <button class="small" type="button" onclick="startEdit(${song.id})">編集</button>
        <button class="small sub" type="button" onclick="delSong(${song.id})">削除</button>
      </div>
    </div>
  `).join("");

  items.forEach(song => {
    if (song.abc) {
      try {
        ABCJS.renderAbc(`abc-${song.id}`, song.abc, {
          responsive: "resize",
          add_classes: true,
          staffwidth: 680
        });
      } catch (e) {
        console.error(e);
      }
    }
  });

  updateStatusButtons();
}

function renderSets() {
  const setList = document.getElementById("setList");
  const items = filteredSets();

  if (!setList) return;

  if (items.length === 0) {
    setList.innerHTML = `<div class="empty-box">まだSETがありません。</div>`;
    return;
  }

  setList.innerHTML = items.map(set => {
    const songsHtml = set.songIds.map(songId => {
      const song = getSongById(songId);
      if (!song) return "";

      const isOpen = openSetSongDetailId === song.id;

      return `
        <div class="meta">
          <a class="set-song-link" href="javascript:void(0)" onclick="toggleSetSongDetail(${song.id})">${escapeHtml(song.title)}</a>
        </div>

        ${isOpen ? `
          <div class="set-song-detail-panel">
            <div class="title" style="font-size:16px;">${escapeHtml(song.title)}</div>
            <div id="set-detail-abc-${song.id}" class="notation"></div>
            <div class="inline-actions">
              <button class="small" type="button" onclick="openSongFromSet(${song.id})">曲一覧で開く</button>
              <button class="small sub" type="button" onclick="toggleSetSongDetail(${song.id})">閉じる</button>
            </div>
          </div>
        ` : ""}
      `;
    }).join("");

    return `
      <div class="set-item">
        <div class="title-row">
          <div class="title">${escapeHtml(set.name)}</div>
          ${renderTags(set.tags)}
        </div>

        <div class="set-box">
          ${songsHtml || `<div class="muted">曲がありません</div>`}
          ${
            set.memo
              ? `<div class="memo-block" style="margin-top:10px;">${linkifyText(set.memo)}</div>`
              : `<div class="muted" style="margin-top:10px;">メモなし</div>`
          }
        </div>

        <div class="inline-actions">
          <button class="small" type="button" onclick="editSet(${set.id})">編集</button>
          <button class="small sub" type="button" onclick="deleteSet(${set.id})">削除</button>
        </div>
      </div>
    `;
  }).join("");
}

function editSet(setId) {
  const set = getSetById(setId);
  if (!set) return;

  editSetEditorTags = uniqueTags(set.tags || []);

  const container = document.getElementById("setList");

  container.innerHTML = `
    <div class="card">
      <h2>${escapeHtml(set.name)}（編集）</h2>

      <label>メモ（参考URLなど）</label>
      <textarea id="editSetMemo">${escapeHtml(set.memo || "")}</textarea>

      <label>属性タグ</label>
      <div id="editSetTagEditor" class="tag-picker-box"></div>

      <div style="margin-top:12px;">
        <h3>曲を追加</h3>

        <label>ジャンルで絞り込み</label>
        <select id="editSetGenreFilter" onchange="updateEditSetSongSelect()">
          <option value="all">ALL</option>
          <option>Reel</option>
          <option>Jig</option>
          <option>Slip Jig</option>
          <option>Hornpipe</option>
          <option>Polka</option>
          <option>Slide</option>
          <option>Waltz</option>
          <option>March</option>
          <option>Barndance</option>
          <option>Mazurka</option>
          <option>Strathspey</option>
          <option>Highland</option>
          <option>Air</option>
          <option>Planxty</option>
          <option>Other</option>
        </select>

        <label>追加する曲</label>
        <select id="editSetSongSelect"></select>

        <button type="button" onclick="addSongToExistingSet(${set.id})">このSETに曲を追加</button>
      </div>

      <div style="margin-top:12px;">
        <h3>曲の順番</h3>
        <div id="editSetSongs"></div>
      </div>

      <div style="margin-top:16px;" class="inline-actions">
        <button onclick="saveSetEdit(${set.id})">保存</button>
        <button class="sub" onclick="renderAll()">戻る</button>
      </div>
    </div>
  `;

  renderEditSetTagEditor();
  updateEditSetSongSelect();
  renderEditSetSongs(set);
}

function updateEditSetSongSelect() {
  const genre = document.getElementById("editSetGenreFilter")?.value || "all";
  const select = document.getElementById("editSetSongSelect");

  if (!select) return;

  let filtered = songs;

  if (genre !== "all") {
    filtered = songs.filter(song => (song.genre || "Other") === genre);
  }

  if (filtered.length === 0) {
    select.innerHTML = `<option value="">該当なし</option>`;
    return;
  }

  select.innerHTML = filtered.map(song =>
    `<option value="${song.id}">${escapeHtml(song.title)} (${escapeHtml(song.genre || "Other")})</option>`
  ).join("");
}

function addSongToExistingSet(setId) {
  const set = getSetById(setId);
  if (!set) return;

  const select = document.getElementById("editSetSongSelect");
  const songId = Number(select?.value);

  if (!songId) return;

  set.songIds.push(songId);
  saveSets();
  renderEditSetSongs(set);
}

function renderEditSetSongs(set) {
  const box = document.getElementById("editSetSongs");
  if (!box) return;

  box.innerHTML = set.songIds.map((songId, index) => {
    const song = getSongById(songId);
    if (!song) return "";

    return `
      <div class="set-song-row">
        <div>${index + 1}. ${escapeHtml(song.title)}</div>
        <div class="inline-actions">
          <button class="small" onclick="moveSongInSet(${set.id}, ${index}, -1)">↑</button>
          <button class="small" onclick="moveSongInSet(${set.id}, ${index}, 1)">↓</button>
          <button class="small sub" onclick="removeSongFromSet(${set.id}, ${index})">削除</button>
        </div>
      </div>
    `;
  }).join("");
}

function moveSongInSet(setId, index, direction) {
  const set = getSetById(setId);
  if (!set) return;

  const newIndex = index + direction;
  if (newIndex < 0 || newIndex >= set.songIds.length) return;

  const temp = set.songIds[index];
  set.songIds[index] = set.songIds[newIndex];
  set.songIds[newIndex] = temp;

  saveSets();
  renderEditSetSongs(set);
}

function removeSongFromSet(setId, index) {
  const set = getSetById(setId);
  if (!set) return;

  set.songIds.splice(index, 1);
  saveSets();
  renderEditSetSongs(set);
}

function saveSetEdit(setId) {
  const set = getSetById(setId);
  if (!set) return;

  const memo = document.getElementById("editSetMemo").value;

  set.memo = memo;
  set.tags = uniqueTags(editSetEditorTags);

  saveSets();
  renderAll();
}

function deleteSet(setId) {
  if (!confirm("このSETを削除しますか？")) return;
  sets = sets.filter(set => set.id !== setId);
  saveSets();
  renderAll();
}

function updateSongSelectForSet() {
  const select = document.getElementById("songSelectForSet");
  const genre = document.getElementById("genreFilterForSet")?.value || "all";

  if (!select) return;

  let filtered = songs;

  if (genre !== "all") {
    filtered = songs.filter(song => (song.genre || "Other") === genre);
  }

  if (filtered.length === 0) {
    select.innerHTML = `<option value="">該当なし</option>`;
    return;
  }

  select.innerHTML = filtered.map(song =>
    `<option value="${song.id}">${escapeHtml(song.title)}</option>`
  ).join("");
}

function addSongToTempSet() {
  const select = document.getElementById("songSelectForSet");
  const songId = Number(select.value);

  if (!songId) return;

  tempSetSongs.push(songId);
  renderTempSet();
}

function renderTempSet() {
  const box = document.getElementById("tempSetList");

  if (!box) return;

  if (tempSetSongs.length === 0) {
    box.innerHTML = `<div class="muted">まだ曲がありません</div>`;
    return;
  }

  box.innerHTML = tempSetSongs.map((songId, index) => {
    const song = getSongById(songId);
    if (!song) return "";

    return `
      <div class="set-song-row">
        <div>${index + 1}. ${escapeHtml(song.title)}</div>
        <div class="inline-actions">
          <button class="small" onclick="moveTempSong(${index}, -1)">↑</button>
          <button class="small" onclick="moveTempSong(${index}, 1)">↓</button>
          <button class="small sub" onclick="removeTempSong(${index})">削除</button>
        </div>
      </div>
    `;
  }).join("");
}

function moveTempSong(index, direction) {
  const newIndex = index + direction;
  if (newIndex < 0 || newIndex >= tempSetSongs.length) return;

  const temp = tempSetSongs[index];
  tempSetSongs[index] = tempSetSongs[newIndex];
  tempSetSongs[newIndex] = temp;

  renderTempSet();
}

function removeTempSong(index) {
  tempSetSongs.splice(index, 1);
  renderTempSet();
}

function saveTempSet() {
  const name = document.getElementById("setNameInput").value.trim();
  const tags = uniqueTags(setEditorTags);

  if (!name) {
    alert("SET名を入力してください");
    return;
  }

  if (tempSetSongs.length === 0) {
    alert("曲を追加してください");
    return;
  }

  sets.unshift({
    id: Date.now(),
    name,
    songIds: [...tempSetSongs],
    memo: "",
    tags
  });

  saveSets();

  tempSetSongs = [];
  setEditorTags = [];
  document.getElementById("setNameInput").value = "";
  renderTempSet();
  renderSetTagEditor();

  renderAll();
  switchTab("setList");
}

function renderAll() {
  updateTagFilterOptions();
  updateSongSelectForSet();
  renderTempSet();
  renderSongs();
  renderSets();
  renderSongTagEditor();
  renderSetTagEditor();
}

renderAll();
</script>
