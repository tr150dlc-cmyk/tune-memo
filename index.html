<!-- 変更点だけでなく全体版です -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>曲管理アプリ</title>
<script src="https://cdn.jsdelivr.net/npm/abcjs@6.6.2/dist/abcjs-basic-min.js"></script>

<style>
body { font-family: -apple-system; padding:16px; background:#f7f7f7;}
.card { background:#fff; padding:16px; border-radius:12px; margin-bottom:16px;}
button.small{width:auto;padding:6px 10px;margin-right:5px;}
.done .title{ text-decoration:line-through; color:gray;}
.notation{ margin-top:10px; overflow-x:auto;}
button.active{background:#000;color:#fff;}
</style>
</head>

<body>

<div class="card">
<h2>曲管理</h2>

<input id="sessionUrl" placeholder="The Session URL">
<button onclick="fetchFromSession()">URLから自動入力</button>

<input id="title" placeholder="曲名">

<select id="genre">
<option value="">選択</option>
<option>Reel</option>
<option>Jig</option>
<option>Slip Jig</option>
<option>Hornpipe</option>
<option>Polka</option>
<option>Waltz</option>
<option>Air</option>
<option>Other</option>
</select>

<input id="url" placeholder="URL">
<textarea id="memo" placeholder="メモ"></textarea>

<button onclick="addSong()">追加</button>
</div>

<div class="card">

<button class="small status-btn" data-status="all" onclick="setStatus('all')">全部</button>
<button class="small status-btn" data-status="want" onclick="setStatus('want')">未習得</button>
<button class="small status-btn" data-status="done" onclick="setStatus('done')">習得</button>

<select onchange="setGenre(this.value)">
<option value="all">ALL</option>
<option>Reel</option>
<option>Jig</option>
<option>Slip Jig</option>
<option>Hornpipe</option>
<option>Polka</option>
<option>Waltz</option>
<option>Air</option>
<option>Other</option>
</select>

<div id="list"></div>

</div>

<script>

let songs = JSON.parse(localStorage.getItem("songs")) || [];
let status="all";
let genre="all";

function save(){localStorage.setItem("songs",JSON.stringify(songs));}

function extractId(url){
 let m=url.match(/tunes\/(\d+)/);
 return m?m[1]:null;
}

async function fetchFromSession(){
 let url=document.getElementById("sessionUrl").value;
 let id=extractId(url);
 if(!id)return;

 let res=await fetch(`https://thesession.org/tunes/${id}?format=json`);
 let d=await res.json();

 document.getElementById("title").value=d.name;
 document.getElementById("genre").value=d.type;
 document.getElementById("url").value=url;
}

function addSong(){
 let s={
  id:Date.now(),
  title:title.value,
  genre:genre.value||"Other",
  url:url.value,
  memo:memo.value,
  done:false,
  abc:""
 };
 songs.unshift(s);
 save();
 render();
 loadABC(s);
}

async function loadABC(song){
 let id=extractId(song.url);
 if(!id)return;

 let res=await fetch(`https://thesession.org/tunes/${id}?format=json`);
 let d=await res.json();

 let abc=d.settings?.[0]?.abc || d.abc || "";
 song.abc=abc;
 save();
 render();
}

function setStatus(v){status=v;render();}
function setGenre(v){genre=v;render();}

function filtered(){
 return songs.filter(s=>{
  let ok1=status==="all"||(status==="want"&&!s.done)||(status==="done"&&s.done);
  let ok2=genre==="all"||s.genre===genre;
  return ok1&&ok2;
 });
}

function render(){
 let html="";
 filtered().forEach(s=>{
  html+=`
  <div class="${s.done?'done':''}">
    <div class="title">${s.title}</div>
    <div>${s.genre}</div>
    <div>${s.memo||""}</div>

    <button class="small" onclick="toggle(${s.id})">切替</button>
    <button class="small" onclick="del(${s.id})">削除</button>

    <div id="abc-${s.id}" class="notation"></div>
  </div>`;
 });

 list.innerHTML=html;

 filtered().forEach(s=>{
  if(s.abc){
   try{
    ABCJS.renderAbc(`abc-${s.id}`, s.abc);
   }catch{}
  }
 });

 document.querySelectorAll(".status-btn").forEach(b=>{
  b.classList.remove("active");
  if(b.dataset.status===status)b.classList.add("active");
 });
}

function toggle(id){
 songs=songs.map(s=>s.id===id?{...s,done:!s.done}:s);
 save();render();
}

function del(id){
 songs=songs.filter(s=>s.id!==id);
 save();render();
}

render();

</script>

</body>
</html>
