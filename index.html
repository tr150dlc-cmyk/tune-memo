<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>曲管理アプリ</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 0;
  padding: 16px;
  background: #f7f7f7;
}

.card {
  background: #fff;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 16px;
}

input, select, textarea, button {
  width: 100%;
  margin-top: 8px;
  margin-bottom: 8px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  background: #222;
  color: white;
  border: none;
}

button.sub {
  background: #666;
}

button.small {
  width: auto;
  padding: 6px 10px;
  margin-right: 5px;
}

button.active {
  background: #000;
}

.done .title {
  text-decoration: line-through;
  color: gray;
}

.badge {
  font-size: 12px;
  margin-left: 5px;
}
</style>
</head>

<body>

<div class="card">
<h2 id="formTitle">曲を追加</h2>

<input id="sessionUrl" placeholder="The Session URL">
<button onclick="fetchFromSession()">URLから自動入力</button>

<input id="title" placeholder="曲名">

<select id="genre">
<option value="">選択</option>
<option>Reel</option>
<option>Jig</option>
<option>Slip Jig</option>
<option>Hornpipe</option>
<option>Polka</option>
<option>Slide</option>
<option>Waltz</option>
<option>March</option>
<option>Air</option>
<option>Other</option>
</select>

<input id="url" placeholder="URL">
<textarea id="memo" placeholder="メモ"></textarea>

<button id="saveButton" onclick="addOrUpdateSong()">追加</button>
<button class="sub" id="cancelEditButton" onclick="cancelEdit()" style="display:none;">キャンセル</button>
</div>

<div class="card">

<!-- 状態ボタン -->
<div>
<button class="small status-btn" data-status="all" onclick="setStatusFilter('all')">全部</button>
<button class="small status-btn" data-status="want" onclick="setStatusFilter('want')">覚えていない</button>
<button class="small status-btn" data-status="done" onclick="setStatusFilter('done')">覚えた</button>
</div>

<!-- ジャンル -->
<select id="genreFilter" onchange="setGenreFilter(this.value)">
<option value="all">ALL</option>
<option value="Reel">Reel</option>
<option value="Jig">Jig</option>
<option value="Slip Jig">Slip Jig</option>
<option value="Hornpipe">Hornpipe</option>
<option value="Polka">Polka</option>
<option value="Slide">Slide</option>
<option value="Waltz">Waltz</option>
<option value="March">March</option>
<option value="Air">Air</option>
<option value="Other">Other</option>
</select>

<div id="list"></div>

</div>

<script>

const STORAGE_KEY = "tuneMemoSongsV2";
let songs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

let statusFilter = "all";
let genreFilter = "all";
let editingId = null;

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(songs));
}

function extractTuneId(url) {
  const match = url.match(/tunes\/(\d+)/);
  return match ? match[1] : null;
}

async function fetchFromSession() {
  const url = document.getElementById("sessionUrl").value;
  const id = extractTuneId(url);
  if (!id) return;

  try {
    const res = await fetch(`https://thesession.org/tunes/${id}?format=json`);
    const data = await res.json();

    document.getElementById("title").value = data.name;
    document.getElementById("genre").value = data.type;
    document.getElementById("url").value = url;
  } catch {}
}

function addOrUpdateSong() {
  const title = document.getElementById("title").value;
  const genre = document.getElementById("genre").value || "Other";
  const url = document.getElementById("url").value;
  const memo = document.getElementById("memo").value;

  if (!title) return;

  if (editingId !== null) {
    songs = songs.map(s =>
      s.id === editingId ? { ...s, title, genre, url, memo } : s
    );
  } else {
    songs.unshift({
      id: Date.now(),
      title,
      genre,
      url,
      memo,
      done: false
    });
  }

  save();
  clearForm();
  render();
}

function startEdit(id) {
  const s = songs.find(x => x.id === id);

  editingId = id;
  document.getElementById("formTitle").textContent = "編集";
  document.getElementById("saveButton").textContent = "保存";
  document.getElementById("cancelEditButton").style.display = "block";

  document.getElementById("title").value = s.title;
  document.getElementById("genre").value = s.genre;
  document.getElementById("url").value = s.url;
  document.getElementById("memo").value = s.memo;
}

function cancelEdit() {
  editingId = null;
  clearForm();
}

function clearForm() {
  document.getElementById("title").value = "";
  document.getElementById("genre").value = "";
  document.getElementById("url").value = "";
  document.getElementById("memo").value = "";
  document.getElementById("formTitle").textContent = "曲を追加";
  document.getElementById("saveButton").textContent = "追加";
  document.getElementById("cancelEditButton").style.display = "none";
}

function toggleDone(id) {
  songs = songs.map(s =>
    s.id === id ? { ...s, done: !s.done } : s
  );
  save();
  render();
}

function delSong(id) {
  songs = songs.filter(s => s.id !== id);
  save();
  render();
}

function setStatusFilter(v) {
  statusFilter = v;
  render();
}

function setGenreFilter(v) {
  genreFilter = v;
  render();
}

function updateStatusButtons() {
  document.querySelectorAll(".status-btn").forEach(btn => {
    btn.classList.remove("active");
    if (btn.dataset.status === statusFilter) {
      btn.classList.add("active");
    }
  });
}

function filteredSongs() {
  return songs.filter(s => {
    const statusOK =
      statusFilter === "all" ||
      (statusFilter === "want" && !s.done) ||
      (statusFilter === "done" && s.done);

    const genreOK =
      genreFilter === "all" ||
      s.genre === genreFilter;

    return statusOK && genreOK;
  });
}

function render() {
  const list = document.getElementById("list");

  list.innerHTML = filteredSongs().map(s => `
    <div class="${s.done ? 'done' : ''}">
      <div class="title">
        ${s.title}
        <span class="badge">${s.done ? "覚えた" : "覚えていない"}</span>
      </div>
      <div>${s.genre}</div>
      ${s.url ? `<a href="${s.url}" target="_blank">リンク</a>` : ""}
      <div>${s.memo || ""}</div>
      <button class="small" onclick="toggleDone(${s.id})">切替</button>
      <button class="small" onclick="startEdit(${s.id})">編集</button>
      <button class="small sub" onclick="delSong(${s.id})">削除</button>
    </div>
  `).join("");

  updateStatusButtons();
}

render();

</script>

</body>
</html>
